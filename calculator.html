<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFPP Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF69B4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            border: 5px solid #FFD700;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-emoji {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .header h1 {
            color: #FF69B4;
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .display {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            border: 3px solid #FFD700;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .display-label {
            color: #FF69B4;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .display-values {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .display-value {
            flex: 1;
            text-align: center;
        }

        .display-value label {
            display: block;
            color: #999;
            font-size: 0.8em;
            margin-bottom: 3px;
        }

        .display-value input {
            width: 100%;
            background: white;
            border: 2px solid #FFD700;
            border-radius: 5px;
            padding: 8px;
            font-size: 1.2em;
            font-weight: bold;
            color: #FF69B4;
            text-align: center;
        }

        .display-value input:focus {
            outline: none;
            border-color: #FF69B4;
            box-shadow: 0 0 5px rgba(255, 105, 180, 0.3);
        }

        .result-display {
            background: white;
            border: 2px solid #FF69B4;
            border-radius: 5px;
            padding: 12px;
            font-size: 1.5em;
            font-weight: bold;
            color: #FF69B4;
            text-align: center;
            min-height: 40px;
        }

        .operations {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .operation-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .operation-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            color: white;
            font-family: inherit;
        }

        .operation-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .operation-btn:active {
            transform: translateY(-1px);
        }

        .btn-add {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        }

        .btn-add:hover {
            background: linear-gradient(135deg, #45a049 0%, #3d8b40 100%);
        }

        .btn-sub {
            background: linear-gradient(135deg, #F44336 0%, #da190b 100%);
        }

        .btn-sub:hover {
            background: linear-gradient(135deg, #da190b 0%, #ba0a0a 100%);
        }

        .btn-div {
            background: linear-gradient(135deg, #2196F3 0%, #0b7dda 100%);
        }

        .btn-div:hover {
            background: linear-gradient(135deg, #0b7dda 0%, #0a66c2 100%);
        }

        .btn-mul {
            background: linear-gradient(135deg, #FF9800 0%, #e68900 100%);
        }

        .btn-mul:hover {
            background: linear-gradient(135deg, #e68900 0%, #cc7700 100%);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-clear {
            background: #95a5a6;
            padding: 12px;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-clear:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .info-box {
            background: #f0f0f0;
            border-left: 4px solid #FFD700;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 0.9em;
            color: #333;
        }

        .info-box strong {
            color: #FF69B4;
        }

        @media (max-width: 500px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.6em;
            }

            .header-emoji {
                font-size: 50px;
            }

            .operation-btn {
                font-size: 1em;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-emoji">🌐</div>
            <h1>AFPP Calculator</h1>
            <p>I'm ready!</p>
            <p>Our website link: https://ayaanshatomic810.wixsite.com/atomic-and-hca </p>
        </div>

        <div class="display">
            <div class="display-label">Enter Your Numbers</div>
            <div class="display-values">
                <div class="display-value">
                    <label>First Number</label>
                    <input type="number" id="num1" placeholder="Please Insert First Number" required>
                </div>
                <div class="display-value">
                    <label>Second Number</label>
                    <input type="number" id="num2" placeholder="Please Insert Second Number" required>
                </div>
            </div>
            <div class="display-label">Result</div>
            <div class="result-display" id="result">0</div>
        </div>

        <div class="operations">
            <div class="operation-group">
                <button class="operation-btn btn-add" onclick="calculate('add')">
                    ➕ Add (Sports)
                </button>
                <button class="operation-btn btn-sub" onclick="calculate('sub')">
                    ➖ Subtract (Movies)
                </button>
            </div>
            <div class="operation-group">
                <button class="operation-btn btn-div" onclick="calculate('div')">
                    ➗ Divide (Coding)
                </button>
                <button class="operation-btn btn-mul" onclick="calculate('mul')">
                    ✖️ Multiply (Gaming)
                </button>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-clear" onclick="clearCalculator()">🔄 Clear</button>
        </div>

        <div class="info-box">
            <strong>🧠 How to use:</strong><br>
            1. Enter two numbers<br>
            2. Click any operation button<br>
            3. See your result instantly!<br>
            <strong style="color: #FF9800;">Fun fact:</strong> Operations are named after our genres of our channel! 🎉
        </div>
    </div>

    <script>
        function calculate(operation) {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const resultDisplay = document.getElementById('result');

            // Validate inputs
            if (isNaN(num1) || isNaN(num2)) {
                resultDisplay.textContent = 'Error: Enter valid numbers!';
                resultDisplay.style.color = '#F44336';
                return;
            }

            let result = 0;
            let operationName = '';

            switch(operation) {
                case 'add':
                    result = num1 + num2;
                    operationName = 'Add (Sports)';
                    break;
                case 'sub':
                    result = num1 - num2;
                    operationName = 'Subtract (Movies)';
                    break;
                case 'div':
                    if (num2 === 0) {
                        resultDisplay.textContent = 'Error: Cannot divide by zero!';
                        resultDisplay.style.color = '#F44336';
                        return;
                    }
                    result = num1 / num2;
                    operationName = 'Divide (Coding)';
                    break;
                case 'mul':
                    result = num1 * num2;
                    operationName = 'Multiply (Gaming)';
                    break;
            }

            // Display result with proper formatting
            if (result % 1 !== 0) {
                result = result.toFixed(2);
            }

            resultDisplay.textContent = result;
            resultDisplay.style.color = '#FF69B4';
        }

        function clearCalculator() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('result').textContent = '0';
            document.getElementById('result').style.color = '#FF69B4';
            document.getElementById('num1').focus();
        }

        // Allow Enter key to calculate
        document.getElementById('num1').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('num2').focus();
            }
        });

        document.getElementById('num2').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculate('add'); // Default to add on Enter
            }
        });

        // Focus on first input on load
        document.getElementById('num1').focus();
    </script>
</body>
</html>
